<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100x v2 - 03 Billboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.scene{min-height:100vh;display:flex;flex-direction:column}

/* 顶部品牌条 */
.brand-bar{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.logo{font-size:18px;font-weight:900;letter-spacing:-1px}
.logo span{color:#8b5cf6}

/* 主舞台 — 巨型广告牌 */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative}

.billboard{width:100%;max-width:900px;aspect-ratio:16/7;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 40px 120px rgba(139,92,246,0.15);border:1px solid rgba(255,255,255,0.06)}
.billboard .bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.billboard .content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
.billboard h2{font-size:42px;font-weight:900;letter-spacing:-2px;margin-bottom:8px;text-shadow:0 4px 20px rgba(0,0,0,0.5)}
.billboard .ad-tag{background:#e11d48;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:3px;position:absolute;top:16px;right:16px}
.billboard .prod-img{width:120px;height:120px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);margin-bottom:12px;box-shadow:0 8px 32px rgba(139,92,246,0.4)}
.billboard .cta-small{display:inline-flex;padding:8px 20px;background:#fff;color:#111;border-radius:8px;font-size:12px;font-weight:700}

/* 底部小广告卡片流 */
.ad-strip{display:flex;gap:12px;margin-top:32px;overflow:hidden;max-width:900px;width:100%;justify-content:center;flex-wrap:wrap}
.ad-card{width:140px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.ad-card .card-img{height:100px;position:relative}
.ad-card .card-body{padding:8px;background:rgba(255,255,255,0.03)}
.ad-card .card-body .name{font-size:9px;font-weight:700;margin-bottom:2px}
.ad-card .card-body .size{font-size:8px;color:rgba(255,255,255,0.3)}

.s1 .card-img{background:linear-gradient(135deg,#667eea,#764ba2)}
.s2 .card-img{background:linear-gradient(135deg,#f093fb,#f5576c)}
.s3 .card-img{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.s4 .card-img{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.s5 .card-img{background:linear-gradient(135deg,#fa709a,#fee140)}
.s6 .card-img{background:linear-gradient(135deg,#fccb90,#d57eeb)}

/* CTA区域 */
.cta-area{margin-top:40px;text-align:center}
.cta-area h1{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
.cta-area .grad{background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cta-area .sub{font-size:14px;color:rgba(255,255,255,0.35);margin-bottom:16px}
.cta-area .slogan{font-size:18px;font-weight:700;margin-bottom:20px;color:#e2e8f0}
.cta-btn{display:inline-flex;padding:14px 32px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);border-radius:12px;font-size:15px;font-weight:700;color:#fff;text-decoration:none;box-shadow:0 12px 40px rgba(139,92,246,0.25)}
</style>
</head>
<body>
<div class="scene">
  <div class="brand-bar">
    <div class="logo">100<span>x</span></div>
    <div style="font-size:13px;color:rgba(255,255,255,0.3)">DTC广告素材生成器</div>
  </div>
  <div class="stage">
    <!-- 巨型广告牌 -->
    <div class="billboard">
      <div class="bg"></div>
      <div class="ad-tag">SPONSORED</div>
      <div class="content">
        <div class="prod-img"></div>
        <h2>Summer Collection<br><span style="color:#8b5cf6">50% OFF</span></h2>
        <div class="cta-small">Shop Now →</div>
      </div>
    </div>

    <!-- 底部素材卡片流 -->
    <div class="ad-strip">
      <div class="ad-card s1"><div class="card-img"></div><div class="card-body"><div class="name">IG Feed 1:1</div><div class="size">1080×1080</div></div></div>
      <div class="ad-card s2"><div class="card-img"></div><div class="card-body"><div class="name">Story 9:16</div><div class="size">1080×1920</div></div></div>
      <div class="ad-card s3"><div class="card-img"></div><div class="card-body"><div class="name">FB Ad 16:9</div><div class="size">1920×1080</div></div></div>
      <div class="ad-card s4"><div class="card-img"></div><div class="card-body"><div class="name">TikTok 9:16</div><div class="size">1080×1920</div></div></div>
      <div class="ad-card s5"><div class="card-img"></div><div class="card-body"><div class="name">Pinterest 2:3</div><div class="size">1000×1500</div></div></div>
      <div class="ad-card s6"><div class="card-img"></div><div class="card-body"><div class="name">Google 1.91:1</div><div class="size">1200×628</div></div></div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <h1>你的品牌广告素材，<span class="grad">我们包了</span></h1>
      <div class="slogan">不是贴Logo，是理解你的品牌</div>
      <div class="sub">品牌色 + 卖点 → 30秒出8张多平台广告素材</div>
      <a href="#" class="cta-btn">免费生成素材 →</a>
    </div>
  </div>
</div>
</body>
</html>
