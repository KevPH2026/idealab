<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100x Mockup C - Neon Cyberpunk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', -apple-system, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }

.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; position: relative; }

/* Neon grid background */
.grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px); background-size: 60px 60px; }
.glow-1 { position: absolute; top: 10%; left: 30%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,255,200,0.08), transparent 70%); }
.glow-2 { position: absolute; bottom: 10%; right: 20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,0,128,0.06), transparent 70%); }

.content { position: relative; z-index: 1; max-width: 800px; }
.eyebrow { font-size: 13px; letter-spacing: 6px; text-transform: uppercase; color: #00ffc8; margin-bottom: 32px; font-weight: 700; }
h1 { font-size: 80px; font-weight: 800; line-height: 0.95; letter-spacing: -4px; margin-bottom: 24px; }
.neon-green { color: #00ffc8; text-shadow: 0 0 40px rgba(0,255,200,0.3); }
.neon-pink { color: #ff0080; text-shadow: 0 0 40px rgba(255,0,128,0.3); }
.slogan { font-size: 24px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(90deg, #00ffc8, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.desc { font-size: 17px; color: rgba(255,255,255,0.4); margin-bottom: 40px; line-height: 1.6; }

.cta-row { display: flex; gap: 16px; justify-content: center; }
.btn-primary { padding: 16px 36px; background: #00ffc8; color: #0a0a0a; border-radius: 8px; font-size: 16px; font-weight: 800; text-decoration: none; font-family: inherit; }
.btn-ghost { padding: 16px 36px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border-radius: 8px; font-size: 16px; font-weight: 700; text-decoration: none; font-family: inherit; }

/* Flow */
.flow { display: flex; align-items: center; justify-content: center; gap: 0; margin-top: 80px; position: relative; z-index: 1; }
.flow-step { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 28px 32px; text-align: center; min-width: 180px; }
.flow-step .icon { font-size: 32px; margin-bottom: 8px; }
.flow-step .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.flow-step .detail { font-size: 12px; color: rgba(255,255,255,0.3); }
.flow-arrow { font-size: 24px; color: rgba(255,255,255,0.1); padding: 0 8px; }
</style>
</head>
<body>
<div class="hero">
  <div class="grid-bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="content">
    <div class="eyebrow">DTC 广告素材 · AI 生成</div>
    <h1><span class="neon-green">你的品牌</span><br>广告素材<br><span class="neon-pink">我们包了</span></h1>
    <p class="slogan">不是贴Logo，是理解你的品牌</p>
    <p class="desc">品牌色 + 一句话卖点 → 30秒自动生成8张多平台广告素材<br>IG / TikTok / Facebook / Google 全覆盖</p>
    <div class="cta-row">
      <a href="#" class="btn-primary">免费生成素材 →</a>
      <a href="#" class="btn-ghost">看演示</a>
    </div>
  </div>

  <div class="flow">
    <div class="flow-step">
      <div class="icon">🎨</div>
      <div class="title">输入品牌</div>
      <div class="detail">品牌名+色+市场</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">
      <div class="icon">✍️</div>
      <div class="title">描述产品</div>
      <div class="detail">一句话核心卖点</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">
      <div class="icon">⚡</div>
      <div class="title">30秒出图</div>
      <div class="detail">8张素材多平台</div>
    </div>
  </div>
</div>
</body>
</html>
