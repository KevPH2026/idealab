<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100x Mockup H - Minimalist Japanese</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Serif SC', serif; background: #f5f0eb; color: #1a1a1a; }
.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 24px; position: relative; }

/* Single red circle */
.enso { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; border: 3px solid rgba(200,50,50,0.08); border-radius: 50%; }

.tag { font-size: 11px; letter-spacing: 8px; text-transform: uppercase; color: #999; margin-bottom: 48px; }
h1 { font-size: 56px; font-weight: 900; line-height: 1.3; letter-spacing: 2px; margin-bottom: 24px; position: relative; }
.red { color: #c0392b; }
.divider { width: 48px; height: 2px; background: #c0392b; margin: 0 auto 24px; }
.slogan { font-size: 20px; font-weight: 700; margin-bottom: 12px; letter-spacing: 2px; }
.desc { font-size: 15px; color: #888; line-height: 2; margin-bottom: 48px; max-width: 400px; }
.cta { display: inline-block; padding: 14px 40px; border: 2px solid #1a1a1a; color: #1a1a1a; font-size: 15px; font-weight: 700; text-decoration: none; font-family: inherit; letter-spacing: 2px; transition: all 0.3s; }
.cta:hover { background: #1a1a1a; color: #f5f0eb; }

.metrics { display: flex; gap: 48px; margin-top: 80px; }
.metric { text-align: center; }
.metric .val { font-size: 36px; font-weight: 900; color: #c0392b; }
.metric .label { font-size: 12px; color: #999; margin-top: 4px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="hero">
  <div class="enso"></div>
  <div class="tag">DTC 品牌广告素材</div>
  <h1>你的品牌广告素材<br><span class="red">我们包了</span></h1>
  <div class="divider"></div>
  <p class="slogan">不是贴Logo，是理解你的品牌</p>
  <p class="desc">品牌色 · 一句话卖点<br>30秒 · 8张素材 · 多平台自动适配</p>
  <a href="#" class="cta">免费生成</a>
  <div class="metrics">
    <div class="metric"><div class="val">30s</div><div class="label">出图</div></div>
    <div class="metric"><div class="val">8</div><div class="label">场景</div></div>
    <div class="metric"><div class="val">0</div><div class="label">门槛</div></div>
    <div class="metric"><div class="val">∞</div><div class="label">品牌</div></div>
  </div>
</div>
</body>
</html>
