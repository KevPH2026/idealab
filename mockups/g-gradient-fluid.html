<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100x Mockup G - Gradient Fluid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
.hero { min-height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; }

/* Animated gradient blobs */
.blob-1 { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); filter: blur(80px); opacity: 0.4; top: -10%; left: -10%; animation: float1 8s ease-in-out infinite; }
.blob-2 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: linear-gradient(135deg, #f093fb, #f5576c); filter: blur(80px); opacity: 0.3; bottom: -5%; right: -5%; animation: float2 10s ease-in-out infinite; }
.blob-3 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: linear-gradient(135deg, #4facfe, #00f2fe); filter: blur(60px); opacity: 0.2; top: 40%; left: 60%; animation: float3 12s ease-in-out infinite; }
@keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(60px, 40px) scale(1.1); } }
@keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-40px, -60px) scale(1.15); } }
@keyframes float3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-50px, 30px) scale(0.9); } }

.content { position: relative; z-index: 1; text-align: center; max-width: 700px; }
.badge { display: inline-flex; padding: 6px 16px; border-radius: 100px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 28px; backdrop-filter: blur(10px); }
h1 { font-size: 64px; font-weight: 900; line-height: 1.05; letter-spacing: -3px; margin-bottom: 16px; }
.grad-text { background: linear-gradient(135deg, #667eea, #f093fb, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: gradShift 4s ease-in-out infinite; }
@keyframes gradShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.slogan { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
.desc { font-size: 16px; color: rgba(255,255,255,0.35); line-height: 1.6; margin-bottom: 36px; }
.cta { display: inline-flex; align-items: center; gap: 8px; padding: 16px 36px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 100px; color: #fff; font-size: 16px; font-weight: 700; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s; }
.cta:hover { background: rgba(255,255,255,0.15); }

.chips { display: flex; gap: 12px; justify-content: center; margin-top: 48px; flex-wrap: wrap; }
.chip { padding: 8px 16px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="hero">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>
  <div class="content">
    <div class="badge">✨ DTC品牌广告素材生成器</div>
    <h1>你的品牌广告素材<br><span class="grad-text">我们包了</span></h1>
    <p class="slogan">不是贴Logo，是理解你的品牌</p>
    <p class="desc">品牌色 + 一句话卖点 → 30秒自动生成8张多平台广告素材</p>
    <a href="#" class="cta">免费生成素材 →</a>
    <div class="chips">
      <div class="chip">📸 30秒出图</div>
      <div class="chip">🎨 品牌色融入</div>
      <div class="chip">📱 全平台适配</div>
      <div class="chip">♾️ 无限换版</div>
      <div class="chip">🆓 免费试用</div>
    </div>
  </div>
</div>
</body>
</html>
