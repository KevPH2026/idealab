<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100x Mockup J - Dashboard App Feel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; display: flex; }
.sidebar { width: 240px; background: #1e293b; padding: 24px 16px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
.sidebar .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.sidebar .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
.sidebar .logo-text { font-size: 16px; font-weight: 800; }
.nav-items { display: flex; flex-direction: column; gap: 2px; }
.nav-item { padding: 10px 12px; border-radius: 8px; font-size: 14px; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
.nav-item.active { background: rgba(139,92,246,0.1); color: #a78bfa; font-weight: 600; }

.main-area { flex: 1; display: flex; flex-direction: column; }
.topbar { height: 56px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.topbar-left { font-size: 14px; color: #94a3b8; }
.topbar-btn { padding: 8px 20px; background: #8b5cf6; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; text-decoration: none; }

.content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }

.hero-card { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(6,182,212,0.05)); border: 1px solid rgba(139,92,246,0.15); border-radius: 20px; padding: 56px 64px; text-align: center; max-width: 680px; width: 100%; }
.hero-card h1 { font-size: 44px; font-weight: 800; line-height: 1.15; letter-spacing: -1px; margin-bottom: 12px; }
.hero-card .grad { background: linear-gradient(135deg, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-card .slogan { font-size: 18px; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
.hero-card .desc { font-size: 14px; color: #64748b; margin-bottom: 28px; line-height: 1.6; }

.btn-row { display: flex; gap: 12px; justify-content: center; }
.btn-main { padding: 12px 28px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); border-radius: 10px; font-size: 14px; font-weight: 700; color: #fff; text-decoration: none; }
.btn-sec { padding: 12px 28px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 14px; font-weight: 600; color: #94a3b8; text-decoration: none; }

.stats-row { display: flex; gap: 24px; margin-top: 40px; }
.stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px 28px; text-align: center; }
.stat-card .val { font-size: 28px; font-weight: 800; color: #a78bfa; }
.stat-card .label { font-size: 11px; color: #64748b; margin-top: 2px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">100x</div>
    <div class="logo-text">100x</div>
  </div>
  <div class="nav-items">
    <div class="nav-item active">🏠 首页</div>
    <div class="nav-item">⚡ 生成素材</div>
    <div class="nav-item">📁 我的作品</div>
    <div class="nav-item">🎨 品牌管理</div>
    <div class="nav-item">📊 数据分析</div>
    <div class="nav-item">⚙️ 设置</div>
  </div>
</div>
<div class="main-area">
  <div class="topbar">
    <div class="topbar-left">欢迎回来 👋</div>
    <a href="#" class="topbar-btn">+ 新建素材</a>
  </div>
  <div class="content">
    <div class="hero-card">
      <h1>你的品牌广告素材<br><span class="grad">我们包了</span></h1>
      <p class="slogan">不是贴Logo，是理解你的品牌</p>
      <p class="desc">品牌色 + 一句话卖点 → 30秒自动生成8张多平台广告素材<br>IG / TikTok / Facebook / Google 全覆盖</p>
      <div class="btn-row">
        <a href="#" class="btn-main">免费生成素材</a>
        <a href="#" class="btn-sec">了解更多</a>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="val">30s</div><div class="label">出图速度</div></div>
      <div class="stat-card"><div class="val">8</div><div class="label">场景并行</div></div>
      <div class="stat-card"><div class="val">4</div><div class="label">平台适配</div></div>
      <div class="stat-card"><div class="val">0</div><div class="label">设计门槛</div></div>
    </div>
  </div>
</div>
</body>
</html>
