<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,40 432,136 432,328 256,424 80,328 80,136"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#050507"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="512" height="512" rx="96" fill="url(#dots)"/>

  <!-- Outer hexagon glow -->
  <polygon points="256,48 426,140 426,324 256,416 86,324 86,140"
    fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>

  <!-- Main hexagon -->
  <polygon points="256,56 420,144 420,320 256,408 92,320 92,144"
    fill="none" stroke="url(#g2)" stroke-width="2.5" opacity="0.8"/>

  <!-- Inner hexagon accent -->
  <polygon points="256,80 400,160 400,304 256,384 112,304 112,160"
    fill="none" stroke="url(#g3)" stroke-width="0.8" opacity="0.25"/>

  <!-- "100" text - bold, geometric -->
  <text x="256" y="260" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
    font-size="140" font-weight="900" letter-spacing="-6" fill="url(#g1)" filter="url(#innerGlow)">
    100
  </text>

  <!-- "x" superscript -->
  <text x="370" y="200" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
    font-size="60" font-weight="900" fill="url(#g2)" filter="url(#innerGlow)">
    x
  </text>

  <!-- Bottom tagline -->
  <text x="256" y="340" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="6" fill="rgba(255,255,255,0.2)">
    AD CREATIVES
  </text>

  <!-- Corner accents -->
  <line x1="92" y1="144" x2="92" y2="170" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
  <line x1="420" y1="144" x2="420" y2="170" stroke="url(#g2)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="408" x2="256" y2="395" stroke="url(#g3)" stroke-width="2" opacity="0.5"/>
</svg>
